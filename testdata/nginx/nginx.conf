server {
    listen 8008;
    listen [::]:8008;

    # For the federation port
    listen 8448 default_server;
    listen [::]:8448 default_server;

    server_name localhost;
    resolver 127.0.0.11 valid=30s;

    location ~ ^(/_matrix/client/(.*)/(login|logout|refresh)|/oauth2|/.well-known/openid-configuration|/authorize|/login|/assets|/consent|/logout) {
        proxy_http_version 1.1;
        set $mas_upstream http://mas:8007;
        proxy_pass $mas_upstream;
        # OR via the Unix domain socket
        #proxy_pass http://unix:/var/run/mas.sock;

        # Forward the client IP address
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # or, using the PROXY protocol
        #proxy_protocol on;
    }

    location ~ ^(/_matrix|/_synapse) {
        # note: do not add a path (even a single /) after the port in `proxy_pass`,
        # otherwise nginx will canonicalise the URI and cause signature verification
        # errors.
        set $synapse_upstream http://synapse:8008;
        proxy_pass $synapse_upstream;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Nginx by default only allows file uploads up to 1M in size
        # Increase client_max_body_size to match max_upload_size defined in homeserver.yaml
        client_max_body_size 50M;

        # Synapse responses may be chunked, which is an HTTP/1.1 feature.
        proxy_http_version 1.1;
    }

    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }
    location ~* ^/admin/.*\.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff|woff2|ttf|eot|webp)$ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public";
    }
}
